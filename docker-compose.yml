version: '3.9'

services:

  # ─── PHP-FPM (Symfony 7) ───────────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: aniarozgotuje_php
    restart: unless-stopped
    volumes:
      - ./api:/var/www/api
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-changeme_secret_local}
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-secret}@mysql:3306/${MYSQL_DATABASE:-aniarozgotuje}?serverVersion=8.0&charset=utf8mb4
      PHP_IDE_CONFIG: "serverName=aniarozgotuje"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ─── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: aniarozgotuje_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/api
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - backend

  # ─── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: aniarozgotuje_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aniarozgotuje}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"   # 3307 żeby nie kolidować z lokalnym MySQL
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ─── phpMyAdmin (debug UI) ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: aniarozgotuje_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
    depends_on:
      - mysql
    networks:
      - backend

  # ─── Mailpit (dev mailer) ─────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: aniarozgotuje_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP
    networks:
      - backend

volumes:
  mysql_data:

networks:
  backend:
    driver: bridge
